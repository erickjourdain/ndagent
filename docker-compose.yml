version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nda-analyzer-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OLLAMA_API_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma3:4b
      - OLLAMA_NUM_CTX=25000
      - ADMIN_PASSWORD=admin123
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: nda-analyzer-frontend
    ports:
      - "3030:80"
    depends_on:
      - backend
    restart: always
